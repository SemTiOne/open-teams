name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate template layout
        run: python3 scripts/validate_template_layout.py
      - name: Check Python syntax
        run: python3 -m py_compile scripts/*.py scripts/init/*.py init-command.py
      - name: Verify init entrypoints
        run: |
          chmod +x init.sh
          ./init.sh --help
          python3 init-command.py --help
