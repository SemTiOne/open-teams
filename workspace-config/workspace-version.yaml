template:
  id: open-teams
  version: 0.4.3
  revision: first-session-init-and-contract-maintenance
  source: local-template
  changelog_path: CHANGELOG.md
  versioning_doc_path: docs/development-specs/workspace-versioning.md

workspace:
  adoption_mode: template
  source_strategy: undecided
  last_upgrade_at: 2026-06-23
  local_customization_notes:
    - 通用模板仓库，不包含业务线专有事实。

applied_capabilities:
  - id: workflow-skills
    status: applied
    summary: 工作空间级 workflow skill 分层、路由与必备章节规范
  - id: workflow-validation
    status: applied
    summary: 模板校验覆盖 workflow skill 文件、章节、入口登记与模板卫生
  - id: gradual-ai-collaboration-adoption
    status: applied
    summary: 支持新建工作空间和存量传统工程渐进式 AI 协作转型
  - id: workspace-upgrade-mechanism
    status: applied
    summary: 通过版本元信息、升级 workflow 和升级提示词支持 AI 交互式按需升级
  - id: user-readable-version-records
    status: applied
    summary: 通过 CHANGELOG 和版本规则说明让用户感知每个模板版本变化
  - id: implementation-plan-confirmation-gate
    status: applied
    summary: 实施计划必须经用户确认后才能进入实施阶段
  - id: sources-gitignore-protection
    status: applied
    summary: 默认忽略 sources 下真实业务源码，仅保留 sources/README.md
  - id: ai-guided-workspace-adoption
    status: applied
    summary: 通过 QUICKSTART 提示词和 adopt_workspace 脚本支持 AI 对话式复制、清理、初始化和校验
  - id: template-history-cleanup
    status: applied
    summary: 通过模板采用清理指南和 prepare_clean_workspace 脚本避免模板自身 task-plans 与 change-history 污染业务工作空间
  - id: node-level-version-maintenance-gate
    status: applied
    summary: 节点验收后必须先提交推送工作空间和适用 sources 仓库改动，再进入下一节点
  - id: template-health-and-init-entrypoints
    status: applied
    summary: 统一 init 入口、启用 CI 校验、修复 skill 登记与模板自检闭环

upgrade_policy:
  mode: ai-prompt-driven
  require_solution_confirmation: true
  require_task_plan: true
  require_node_acceptance: true
  protect_local_customization: true
  require_change_history: true

upgrade_notes:
  - 升级必须先由 AI 输出方案并等待用户确认。
  - 不允许无确认覆盖业务线本地定制。
  - 升级完成后必须验证并补充变更历史。
